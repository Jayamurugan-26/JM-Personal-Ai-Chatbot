<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Jayamurugan</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
    <header class="header">
        <h1>JM system</h1>
        <p>Personal AI Assistant</p>
    </header>

    <main id="messages" class="messages"></main>

    <footer class="input-area">
        <input id="input" type="text" placeholder="Ask something about Jayamurugan..." />
        <button onclick="send()">Send</button>
    </footer>
</div>

<script>
const apiUrl = "http://127.0.0.1:5000/chat";

function send() {
    const input = document.getElementById("input");
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";

    fetch(apiUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: msg })
    })
    .then(res => res.json())
    .then(data => addMessage(data.answer, "bot"))
    .catch(() => addMessage("Server error. Try again.", "bot"));
}

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = `bubble ${sender}`;
    div.innerText = text;
    const messages = document.getElementById("messages");
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
